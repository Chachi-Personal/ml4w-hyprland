# -----------------------------------------------------
# General window decoration
# name: "Rounding All Blur No Shadows"
# -----------------------------------------------------

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 12
        passes = 4
        new_optimizations = on
        ignore_opacity = true
        xray = true
    }

    shadow {
        enabled = true
        range = 32
        render_power = 2
        color = rgba(00000050)
    }
}

layerrule = blur on, match:namespace waybar          # Enable blur for waybar. [web:14]
# layerrule = ignore_alpha 0.2, match:namespace waybar  # Ignore low-alpha pixels; prevents edge bleed/video pickup. [web:42][web:64]
# layerrule = ignorezero, match:namespace waybar       # Skip zero-alpha for clean blur. [web:57]
# layerrule = no_anim on, match:namespace waybar           # Skip animations (reduces repaints). [web:30]
