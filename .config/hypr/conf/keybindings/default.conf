# -----------------------------------------------------
# Key bindings
# name: "Default"
# -----------------------------------------------------

# SUPER KEY
$mainMod = SUPER
$HYPRSCRIPTS = ~/.config/hypr/scripts
$SCRIPTS = ~/.config/ml4w/scripts

# Applications
bind = $mainMod, RETURN, exec, ~/.config/ml4w/settings/terminal.sh            # Open the terminal
bind = $mainMod, KP_ENTER, exec, ~/.config/ml4w/settings/terminal.sh          # Open the terminal
bind = $mainMod, EQUAL, exec, ~/.config/ml4w/settings/calculator.sh           # Open the calculator
bind = $mainMod, W, exec, ~/.config/ml4w/settings/browser.sh                  # Open the browser
bind = $mainMod, E, exec, ~/.config/ml4w/settings/filemanager.sh              # Open the filemanager
bind = $mainMod, D, exec, ~/.config/hypr/scripts/launcher.sh                  # Open appplication launcher
bind = $mainMod CTRL, E, exec, ~/.config/ml4w/settings/emojipicker.sh         # Open the emoji picker
bind = $mainMod CTRL, C, exec, ~/.config/ml4w/settings/calculator.sh          # Open the calculator
bind = $mainMod SHIFT, W, exec, ~/.config/ml4w/settings/browser-incognito.sh  # Open the browser in incognito mode
bind = $mainMod SHIFT, D, exec, ~/.config/ml4w/settings/calculator.sh         # Open the calculator
bind = $mainMod SHIFT, RETURN, exec, ~/.config/ml4w/settings/filemanager.sh   # Open the filemanager
bind = $mainMod SHIFT, KP_ENTER, exec, ~/.config/ml4w/settings/filemanager.sh # Open the filemanager
bind = ALT SHIFT, W, exec, ~/.config/ml4w/settings/browser-tor.sh             # Open the browser in tor mode

# Display
bind = $mainMod SHIFT, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.5}") # Increase display zoom
bind = $mainMod SHIFT, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.5}") # Decrease display zoom
bind = $mainMod SHIFT, Z, exec, hyprctl keyword cursor:zoom_factor 1 # Reset display zoom

# Windows
bind = $mainMod, Q, killactive                                                              # Kill active window
bind = $mainMod SHIFT, Q, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill # Quit active window and all open instances
bind = $mainMod, F, fullscreen, 0                                                           # Set active window to fullscreen
bind = $mainMod, M, fullscreen, 1                                                           # Maximize Window
bind = $mainMod, T, togglefloating                                                          # Toggle active windows into floating mode
bind = $mainMod SHIFT, T, workspaceopt, allfloat                                            # Toggle all windows into floating mode
bind = $mainMod, TAB, togglesplit                                                           # Toggle split
bind = $mainMod, H, movefocus, l                                                            # Move focus left
bind = $mainMod, J, movefocus, d                                                            # Move focus down
bind = $mainMod, K, movefocus, u                                                            # Move focus up
bind = $mainMod, L, movefocus, r                                                            # Move focus right
bind = $mainMod SHIFT, h, swapwindow, l                                                     # Swap window left
bind = $mainMod SHIFT, l, swapwindow, r                                                     # Swap window right
bind = $mainMod SHIFT, k, swapwindow, u                                                     # Swap window up
bind = $mainMod SHIFT, j, swapwindow, d                                                     # Swap window down
bind = ALT SHIFT, h, movewindow, l                                                          # Move window left
bind = ALT SHIFT, l, movewindow, r                                                          # Move window right
bind = ALT SHIFT, k, movewindow, u                                                          # Move window up
bind = ALT SHIFT, j, movewindow, d                                                          # Move window down
bind = $mainMod ALT, J, changegroupactive, f                                              # Next window in group
bind = $mainMod ALT, K, changegroupactive, b                                              # Prev window in group
bind = $mainMod ALT, L, changegroupactive, f                                                # Next window in group
bind = $mainMod ALT, H, changegroupactive, b                                                # Prev window in group
# bind = $mainMod ALT SHIFT, l, movegroupwindow
# bind = $mainMod ALT SHIFT, h, movegroupwindow, b
bindm = $mainMod, mouse:272, movewindow                                                     # Move window with the mouse
bindm = $mainMod, mouse:273, resizewindow                                                   # Resize window with the mouse
bind = $mainMod SHIFT, right, resizeactive, 100 0                                           # Increase window width with keyboard
bind = $mainMod SHIFT, left, resizeactive, -100 0                                           # Reduce window width with keyboard
bind = $mainMod SHIFT, down, resizeactive, 0 100                                            # Increase window height with keyboard
bind = $mainMod SHIFT, up, resizeactive, 0 -100                                             # Reduce window height with keyboard
bind = $mainMod, G, togglegroup                                                             # Toggle window group
binde = ALT,Tab,cyclenext                                                                   # Cycle between windows
binde = ALT,Tab,bringactivetotop                                                            # Bring active window to the top

# Actions
bind = $mainMod SHIFT, A, exec, $HYPRSCRIPTS/toggle-animations.sh                         # Toggle animations
bind = $mainMod, PRINT, exec, $HYPRSCRIPTS/screenshot.sh                                  # Take a screenshot
bind = $mainMod ALT, F, exec, $HYPRSCRIPTS/screenshot.sh --instant                        # Take an instant full-screen screenshot
bind = $mainMod ALT, S, exec, $HYPRSCRIPTS/screenshot.sh --instant-area                   # Take an instant area screenshot
bind = $mainMod ALT, A, exec, $HYPRSCRIPTS/text-extractor.sh                              # Extract text from an area
bind = $mainMod, X, exec, ~/.config/ml4w/scripts/wlogout.sh                               # Start wlogout
bind = $mainMod, N, exec, ~/.config/hypr/scripts/waypaper.sh --random                                         # Change the wallpaper
bind = $mainMod SHIFT, N, exec, ~/.config/hypr/scripts/waypaper.sh                                                   # Open wallpaper selector
bind = $mainMod ALT, N, exec, $HYPRSCRIPTS/wallpaper-automation.sh                        # Start random wallpaper script
bind = $mainMod CTRL, K, exec, $HYPRSCRIPTS/keybindings.sh                                # Show keybindings
bind = $mainMod SHIFT, B, exec, ~/.config/waybar/launch.sh                                # Reload waybar
bind = $mainMod CTRL, B, exec, ~/.config/waybar/toggle.sh                                 # Toggle waybar
bind = $mainMod SHIFT, R, exec, $HYPRSCRIPTS/loadconfig.sh                                # Reload hyprland config
bind = $mainMod, V, exec, $SCRIPTS/cliphist.sh                                            # Open clipboard manager
bind = $mainMod CTRL, T, exec, ~/.config/waybar/themeswitcher.sh                          # Open waybar theme switcher
bind = $mainMod CTRL, S, exec, flatpak run com.ml4w.settings                              # Open ML4W Dotfiles Settings app
bind = $mainMod ALT, G, exec, $HYPRSCRIPTS/gamemode.sh                                    # Toggle game mode
bind = $mainMod CTRL, L, exec, ~/.config/hypr/scripts/power.sh lock                       # Launch Hyprshade
# bind = $mainMod SHIFT, H, exec, $HYPRSCRIPTS/hyprshade.sh                                 # Start wlogout
# bind = CTRL, Tab, exec, ~/.config/ml4w/scripts/focus.sh                                   # Open Select Window Menu
bind = CTRL ALT, T, exec, ~/.config/ml4w/themes/themes.sh                                   # Open Select Window Menu

# Sidepad
# bind = $mainMod CTRL, right, exec, ~/.config/ml4w/scripts/sidepad.sh                      # Open Sidepad
# bind = $mainMod CTRL, left, exec, ~/.config/ml4w/scripts/sidepad.sh --hide                # Close Sidepad
# bind = $mainMod, S, exec, ~/.config/ml4w/scripts/sidepad.sh --init                        # Init Sidepad
# bind = $mainMod SHIFT, S, exec, ~/.config/ml4w/scripts/sidepad.sh --select                # Select Sidepad

# Workspaces
bind = $mainMod, 1, exec, ~/.config/hypr/scripts/workspace.sh focus 1  # Open workspace 1
bind = $mainMod, 2, exec, ~/.config/hypr/scripts/workspace.sh focus 2  # Open workspace 2
bind = $mainMod, 3, exec, ~/.config/hypr/scripts/workspace.sh focus 3  # Open workspace 3
bind = $mainMod, 4, exec, ~/.config/hypr/scripts/workspace.sh focus 4  # Open workspace 4
bind = $mainMod, 5, exec, ~/.config/hypr/scripts/workspace.sh focus 5  # Open workspace 5
bind = $mainMod, 6, exec, ~/.config/hypr/scripts/workspace.sh focus 6  # Open workspace 6
bind = $mainMod, 7, exec, ~/.config/hypr/scripts/workspace.sh focus 7  # Open workspace 7
bind = $mainMod, 8, exec, ~/.config/hypr/scripts/workspace.sh focus 8  # Open workspace 8
bind = $mainMod, 9, exec, ~/.config/hypr/scripts/workspace.sh focus 9  # Open workspace 9
bind = $mainMod, 0, exec, ~/.config/hypr/scripts/workspace.sh focus 10 # Open workspace 10

bind = $mainMod SHIFT, 1, exec, ~/.config/hypr/scripts/workspace.sh move 1  # Move active window to workspace 1
bind = $mainMod SHIFT, 2, exec, ~/.config/hypr/scripts/workspace.sh move 2  # Move active window to workspace 2
bind = $mainMod SHIFT, 3, exec, ~/.config/hypr/scripts/workspace.sh move 3  # Move active window to workspace 3
bind = $mainMod SHIFT, 4, exec, ~/.config/hypr/scripts/workspace.sh move 4  # Move active window to workspace 4
bind = $mainMod SHIFT, 5, exec, ~/.config/hypr/scripts/workspace.sh move 5  # Move active window to workspace 5
bind = $mainMod SHIFT, 6, exec, ~/.config/hypr/scripts/workspace.sh move 6  # Move active window to workspace 6
bind = $mainMod SHIFT, 7, exec, ~/.config/hypr/scripts/workspace.sh move 7  # Move active window to workspace 7
bind = $mainMod SHIFT, 8, exec, ~/.config/hypr/scripts/workspace.sh move 8  # Move active window to workspace 8
bind = $mainMod SHIFT, 9, exec, ~/.config/hypr/scripts/workspace.sh move 9  # Move active window to workspace 9
bind = $mainMod SHIFT, 0, exec, ~/.config/hypr/scripts/workspace.sh move 10 # Move active window to workspace 10

# bind = $mainMod, Tab, workspace, m+1       # Open next workspace
# bind = $mainMod SHIFT, Tab, workspace, m-1 # Open previous workspace

bind = $mainMod CTRL, 1, exec, $HYPRSCRIPTS/moveTo.sh 1  # Move all windows to workspace 1
bind = $mainMod CTRL, 2, exec, $HYPRSCRIPTS/moveTo.sh 2  # Move all windows to workspace 2
bind = $mainMod CTRL, 3, exec, $HYPRSCRIPTS/moveTo.sh 3  # Move all windows to workspace 3
bind = $mainMod CTRL, 4, exec, $HYPRSCRIPTS/moveTo.sh 4  # Move all windows to workspace 4
bind = $mainMod CTRL, 5, exec, $HYPRSCRIPTS/moveTo.sh 5  # Move all windows to workspace 5
bind = $mainMod CTRL, 6, exec, $HYPRSCRIPTS/moveTo.sh 6  # Move all windows to workspace 6
bind = $mainMod CTRL, 7, exec, $HYPRSCRIPTS/moveTo.sh 7  # Move all windows to workspace 7
bind = $mainMod CTRL, 8, exec, $HYPRSCRIPTS/moveTo.sh 8  # Move all windows to workspace 8
bind = $mainMod CTRL, 9, exec, $HYPRSCRIPTS/moveTo.sh 9  # Move all windows to workspace 9
bind = $mainMod CTRL, 0, exec, $HYPRSCRIPTS/moveTo.sh 10 # Move all windows to workspace 10

bind = $mainMod, mouse_down, workspace, e+1  # Open next workspace
bind = $mainMod, mouse_up, workspace, e-1    # Open previous workspace
bind = $mainMod CTRL, down, workspace, empty # Open the next empty workspace

# Fn keys
bind = , XF86MonBrightnessUp, exec, brightnessctl -q s +10%                                                                                                  # Increase brightness by 10%
bind = , XF86MonBrightnessDown, exec, brightnessctl -q s 10%-                                                                                                # Reduce brightness by 10%
bindle=, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+                                                                          # Increase volume by 5% (max 100% limit also added hold to raise volume)
bindle=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-                                                                               # Reduce volume by 5% (min 0% limit also added hold to lower volume)
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle                                                                                      # Toggle mute
bind = , XF86AudioPlay, exec, playerctl play-pause                                                                                                           # Audio play pause
bind = , XF86AudioPause, exec, playerctl pause                                                                                                               # Audio pause
bind = , XF86AudioNext, exec, playerctl next                                                                                                                 # Audio next
bind = , XF86AudioPrev, exec, playerctl previous                                                                                                             # Audio previous
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle                                                                               # Toggle microphone
bind = , XF86Calculator, exec, ~/.config/ml4w/settings/calculator.sh                                                                                         # Open calculator
bind = , XF86Lock, exec, hyprlock                                                                                                                            # Open screenlock
bind = , XF86Tools, exec, flatpak run com.ml4w.settings                                                                                                      # Open ML4W Dotfiles Settings app

bind = , code:238, exec, brightnessctl -d smc::kbd_backlight s +10
bind = , code:237, exec, brightnessctl -d smc::kbd_backlight s 10-
